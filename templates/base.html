<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}StreetKingzAI{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #0d0d0d;
            color: #f5f5f5;
        }

        a {
            color: #ffffff;
        }

        .top-nav {
            margin-bottom: 30px;
        }

        .nav-button {
            color: #ffffff;
            text-decoration: none;
            background: #991b1b;
            padding: 10px 16px;
            border-radius: 8px;
            display: inline-block;
            font-weight: bold;
            margin-right: 10px;
        }

        .card {
            background: #171717;
            border: 1px solid #333;
            padding: 24px;
            border-radius: 14px;
            margin-bottom: 22px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #333;
            text-align: left;
        }

        .profit { color: #4ade80; }
        .loss { color: #f87171; }

        input, button {
            padding: 10px;
            margin: 8px 0;
        }

        button, .button {
            background: #991b1b;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        p {
            color: #b5b5b5;
            line-height: 1.5;
        }
    </style>
</head>

<body>

<div class="top-nav">
<a class="button" href="/">← Home</a>
<a class="button" href="/content-engine">Content Engine</a>
<a class="button" href="/business-dashboard">Business Dashboard</a>
<a class="button" href="/business-import">Import Data</a>
</div>

{% block content %}{% endblock %}

</body>
</html>
