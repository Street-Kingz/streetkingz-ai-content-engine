<!DOCTYPE html>
<html>
<head>
    <title>Campaign Brief</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0d0d0d;
            color: #f5f5f5;
            padding: 30px;
        }

        h1, h2 { color: #ffffff; }

        .card {
            background: #181818;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            max-width: 760px;
        }

        label {
            display: block;
            color: #aaa;
            font-size: 13px;
            margin-top: 16px;
            margin-bottom: 6px;
        }

        input, textarea, select {
            width: 100%;
            background: #0f0f0f;
            color: #f5f5f5;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 130px;
            resize: vertical;
        }

        .button {
            display: inline-block;
            background: #8A1316;
            color: white;
            padding: 12px 18px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 20px;
            border: none;
            cursor: pointer;
            font-size: 15px;
        }

        .button-secondary {
            background: #333;
            margin-right: 10px;
        }

        .muted {
            color: #aaa;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <a class="button button-secondary" href="/">Back to Dashboard</a>

    <h1>Weekly Campaign Brief</h1>

    <div class="card">
        <p class="muted">
            Leave everything blank for normal evergreen content. Use this only when you want to steer the week.
        </p>

        <form method="POST" action="/generate-weekly">
            <label>Primary Product</label>
            <input name="primary_product" placeholder="Example: Snow Foam Lance">

            <label>Secondary Product</label>
            <input name="secondary_product" placeholder="Example: XL Barrel Brush">

            <label>Weekly Focus</label>
            <textarea name="weekly_focus" placeholder="Example: Hot weather is coming. Focus on summer washing mistakes, avoiding water spots, and not washing in direct sunlight."></textarea>

            <label>Focus Strength</label>
            <select name="focus_strength">
                <option value="Light">Light - influence 3 to 5 videos</option>
                <option value="Medium">Medium - influence 6 to 9 videos</option>
                <option value="Heavy">Heavy - influence 10 to 14 videos</option>
            </select>

            <button class="button" type="submit">Generate Weekly Plan</button>
        </form>
    </div>

</body>
</html>
